[build-system]
requires = ["setuptools>=80.3.1", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "splent_feature_skin_academic"
version = "0.2.0"
readme = "README.md"
requires-python = ">=3.13"

dependencies = [

]

[tool.setuptools]
package-dir = { "" = "src" }
include-package-data = true

[tool.setuptools.packages.find]
where = ["src"]
exclude = ["*.tests", "*.tests.*"]

[tool.splent]
cli_version = "1.11.0"

# ── Feature Contract (auto-generated) ────────────────────────────────────────
# Do not edit manually — re-run `splent feature:contract --write` to refresh.
[tool.splent.contract]
description = "skin_academic — DIVERSO LAB academic look (tokens + skin.css)"

[tool.splent.contract.provides]
routes     = []
blueprints = []
models     = []
commands   = []
hooks      = []
services   = []
signals    = []
translations = []
docker     = []

[tool.splent.contract.requires]
features = []
env_vars = []
signals  = []

[tool.splent.contract.extensible]
services  = []
templates = ["skin_academic/index.html"]
models    = []
hooks     = []
routes    = false
